# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://help.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "pip" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "monthly"
    groups:
      pip-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 14
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      gha-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 14
  # Dependabot's github-actions ecosystem does not recurse into composite
  # actions under .github/actions/, so each custom action needs its own entry
  # for the `uses:` references inside action.yml to receive updates.
  - package-ecosystem: "github-actions"
    directory: "/.github/actions/install-pkg"
    schedule:
      interval: "monthly"
    groups:
      gha-dependencies:
        patterns:
          - "*"
    cooldown:
      default-days: 14
